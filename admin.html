<body dir="rtl">
    <h2>ניהול מהיר ⚡</h2>
    <input id="tk" type="password" placeholder="הדבק טוקן ghp_ כאן">
    <button onclick="load()">טען מוצרים</button>
    <div id="out"></div>
    <button onclick="save()" id="sv" style="display:none; background:black; color:white;">שמור הכל</button>

    <script>
        let p = [], s = "";
        const url = "https://api.github.com/repos/amirkara17/baiti-shop/contents/products.js";

        async function load() {
            const res = await fetch(url, { headers: { Authorization: `token ${document.getElementById('tk').value.trim()}` } });
            const d = await res.json();
            s = d.sha;
            const content = decodeURIComponent(escape(atob(d.content)));
            p = JSON.parse(content.substring(content.indexOf('['), content.lastIndexOf(']') + 1));
            document.getElementById('out').innerHTML = p.map((m, i) => `<div>${m.name}: <input type="number" value="${m.price}" onchange="p[${i}].price=Number(this.value)"></div>`).join('');
            document.getElementById('sv').style.display = 'block';
        }

        async function save() {
            const body = { message: "update", sha: s, content: btoa(unescape(encodeURIComponent(`const myProducts = ${JSON.stringify(p, null, 2)};`))) };
            const res = await fetch(url, { method: 'PUT', headers: { Authorization: `token ${document.getElementById('tk').value.trim()}` }, body: JSON.stringify(body) });
            if (res.ok) alert("עודכן!"); else alert("שגיאה: " + res.status);
        }
    </script>
</body>
