<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חנות - ביתי</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .box { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea, select { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
        button { background: #C19A5B; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .item { background: #fafafa; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 8px; text-align: right; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row input { width: 50%; }
        #status { margin: 15px 0; font-weight: bold; color: #333; }
        .add-box { background: #f0faef; border: 2px dashed #4CAF50; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: right;}
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h2>התחברות למערכת 🔒</h2>
    <input type="password" id="gh-token" placeholder="הדבק כאן את המפתח (ghp_...)">
    <button onclick="login()">היכנס</button>
</div>

<div id="admin-box" class="box" style="display:none;">
    <button onclick="logout()" style="background:#888; width:auto; float:left; padding:8px 15px;">יציאה</button>
    <div style="clear:both;"></div>
    <h2>פאנל ניהול מוצרים 📦</h2>
    <div id="status"></div>

    <div class="add-box">
        <h3 style="margin-top:0; color: #2e7d32;">✨ הוספת מוצר חדש</h3>
        <input type="text" id="new-name" placeholder="שם המוצר (למשל: עוגת גבינה)">
        <div class="flex-row">
            <input type="number" id="new-price" placeholder="מחיר (₪)">
            <input type="number" id="new-stock" placeholder="מלאי (אופציונלי)">
        </div>
        <input type="text" id="new-cat" placeholder="קטגוריה (למשל: מתוקים, מלוחים)">
        <input type="text" id="new-img" placeholder="קישור לתמונה (URL) או נתיב">
        <textarea id="new-desc" placeholder="פירוט על המוצר..." rows="2"></textarea>
        <button onclick="addProduct()" style="background: #4CAF50;">➕ הוסף לרשימה</button>
    </div>

    <hr style="border: 1px solid #eee; margin: 30px 0;">
    
    <div id="list"></div>
    <button onclick="saveData()" style="background:#222; margin-top:20px; font-size: 1.2em;">שמור ופרסם באתר 🚀</button>
</div>

<script>
    const REPO = "amirkara17/baiti-shop";
    const PATH = "products.js";
    let prods = [];

    window.onload = () => {
        if(localStorage.getItem('bt_token')) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
            loadData();
        }
    };

    function login() {
        const token = document.getElementById('gh-token').value.trim();
        if (!token.startsWith('ghp_')) return alert('מפתח לא תקין.');
        localStorage.setItem('bt_token', token);
        location.reload();
    }

    function logout() { localStorage.removeItem('bt_token'); location.reload(); }

    async function loadData() {
        document.getElementById('status').innerText = "טוען נתונים מהאתר... ⏳";
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${localStorage.getItem('bt_token')}` }
            });
            if (!res.ok) throw new Error('שגיאת חיבור');
            const data = await res.json();
            const text = decodeURIComponent(escape(atob(data.content)));
            const arrMatch = text.match(/\[[\s\S]*\]/);
            if(arrMatch) prods = eval('(' + arrMatch[0] + ')');
            render();
            document.getElementById('status').innerText = "✅ המוצרים נטענו";
        } catch(err) { document.getElementById('status').innerText = "❌ שגיאה: " + err.message; }
    }

    function addProduct() {
        const name = document.getElementById('new-name').value;
        const price = document.getElementById('new-price').value;
        if(!name || !price) return alert("חובה להזין שם ומחיר!");

        prods.unshift({ // מכניס את המוצר לתחילת הרשימה
            id: 'prod_' + Date.now(),
            name: name,
            price: Number(price),
            stock: Number(document.getElementById('new-stock').value) || 0,
            category: document.getElementById('new-cat').value,
            image: document.getElementById('new-img').value,
            description: document.getElementById('new-desc').value
        });

        // איפוס שדות
        document.querySelectorAll('.add-box input, .add-box textarea').forEach(el => el.value = '');
        render();
        window.scrollTo({ top: document.getElementById('list').offsetTop, behavior: 'smooth' });
    }

    function removeProduct(index) {
        if(confirm("האם אתה בטוח שברצונך למחוק מוצר זה?")) {
            prods.splice(index, 1);
            render();
        }
    }

    function render() {
        let html = '';
        prods.forEach((p, i) => {
            html += `
            <div class="item">
                <div class="flex-row">
                    <input type="text" value="${p.name}" onchange="prods[${i}].name=this.value" style="font-weight:bold;">
                    <button onclick="removeProduct(${i})" style="background:#dc2743; width:auto; padding: 10px;">🗑️</button>
                </div>
                <div class="flex-row">
                    <input type="number" placeholder="מחיר" value="${p.price}" onchange="prods[${i}].price=Number(this.value)">
                    <input type="number" placeholder="מלאי" value="${p.stock||0}" onchange="prods[${i}].stock=Number(this.value)">
                </div>
                <div class="flex-row">
                    <input type="text" placeholder="קטגוריה" value="${p.category||''}" onchange="prods[${i}].category=this.value">
                    <input type="text" placeholder="קישור לתמונה" value="${p.image||''}" onchange="prods[${i}].image=this.value">
                </div>
                <textarea placeholder="תיאור המוצר" rows="2" onchange="prods[${i}].description=this.value">${p.description||''}</textarea>
            </div>`;
        });
        document.getElementById('list').innerHTML = html;
    }

    async function saveData() {
        const token = localStorage.getItem('bt_token');
        document.getElementById('status').innerText = "שומר נתונים בשרת... ⏳";
        try {
            const resGet = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const freshSha = (await resGet.json()).sha;

            const newContent = `const myProducts = ${JSON.stringify(prods, null, 4)};`;
            const encoded = btoa(unescape(encodeURIComponent(newContent)));

            const resPut = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update via Admin v2.0", content: encoded, sha: freshSha })
            });

            if(!resPut.ok) throw new Error('השמירה נכשלה');
            document.getElementById('status').innerText = "🎉 נשמר! האתר מתעדכן.";
        } catch(err) { document.getElementById('status').innerText = "❌ שגיאה: " + err.message; }
    }
</script>
</body>
</html>
