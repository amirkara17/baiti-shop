<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Baiti Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #C19A5B; --dark: #2c251f; --light: #FAF8F5; --danger: #dc2743; }
        body { font-family: 'Tajawal', sans-serif; background: var(--light); color: var(--dark); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1em; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #a8834a; }
        .danger-btn { background: var(--danger); }
        .product-item { background: #fdfbf7; border: 1px solid #EAE3D9; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-item input { margin: 5px 0; }
        .full-width { grid-column: 1 / -1; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h1>تسجيل الدخول - مدير المتجر 🔒</h1>
    <p style="text-align: center; color: #666;">أدخل مفتاح الأمان (GitHub Token) للدخول</p>
    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxx">
    <button onclick="login()">دخول</button>
</div>

<div class="container" id="dashboard">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>إدارة المنتجات 📦</h1>
        <button class="danger-btn" onclick="logout()" style="width: auto; padding: 8px 15px;">تسجيل الخروج</button>
    </div>
    
    <div id="status-msg" style="text-align:center; margin-bottom:15px; font-weight:bold; color:var(--primary);"></div>
    
    <div id="products-list"></div>
    
    <button onclick="saveChanges()" id="save-btn" style="background: var(--dark); margin-top: 20px;">حفظ التغييرات ونشرها 🚀</button>
</div>

<script>
    const REPO = "amirkara17/baiti-shop"; // اسم المستودع الخاص بك
    const FILE_PATH = "products.js";
    let fileSha = "";
    let currentProducts = [];

    // בודק אם כבר התחברנו בעבר
    window.onload = () => {
        if(localStorage.getItem('gh_admin_token')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            fetchData();
        }
    };

    function login() {
        const token = document.getElementById('gh-token').value.trim();
        if(!token) return alert("الرجاء إدخال المفتاح!");
        localStorage.setItem('gh_admin_token', token);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        fetchData();
    }

    function logout() {
        localStorage.removeItem('gh_admin_token');
        location.reload();
    }

    async function fetchData() {
        const token = localStorage.getItem('gh_admin_token');
        document.getElementById('status-msg').innerText = "جاري تحميل المنتجات...";
        
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if(!res.ok) throw new Error("المفتاح غير صالح أو لا يملك صلاحيات.");
            
            const data = await res.json();
            fileSha = data.sha; // חשוב כדי להעלות את העדכון
            
            // המרה מקוד מוצפן חזרה לטקסט תקין (תומך בערבית)
            const content = decodeURIComponent(escape(atob(data.content)));
            
            // שליפת המערך מתוך הטקסט של הקובץ
            const jsonStr = content.substring(content.indexOf('['), content.lastIndexOf(']') + 1);
            currentProducts = JSON.parse(jsonStr);
            
            renderProducts();
            document.getElementById('status-msg').innerText = "✅ تم التحميل بنجاح";
        } catch (e) {
            document.getElementById('status-msg').innerText = "❌ خطأ: " + e.message;
            logout();
        }
    }

    function renderProducts() {
        const container = document.getElementById('products-list');
        container.innerHTML = '';
        
        currentProducts.forEach((p, i) => {
            container.innerHTML += `
                <div class="product-item" id="p-${i}">
                    <div class="full-width"><strong>${p.name}</strong></div>
                    <div><label>السعر (₪):</label><input type="number" id="price-${i}" value="${p.price}"></div>
                    <div><label>الكمية المتوفرة:</label><input type="number" id="stock-${i}" value="${p.stock}"></div>
                </div>
            `;
        });
    }

    async function saveChanges() {
        const token = localStorage.getItem('gh_admin_token');
        const btn = document.getElementById('save-btn');
        btn.innerText = "جاري الحفظ..."; btn.disabled = true;

        // איסוף הנתונים החדשים מהשדות
        currentProducts.forEach((p, i) => {
            p.price = Number(document.getElementById(`price-${i}`).value);
            p.stock = Number(document.getElementById(`stock-${i}`).value);
        });

        // בניית הקובץ מחדש
        const newFileContent = `const myProducts = ${JSON.stringify(currentProducts, null, 4)};`;
        
        // המרה חזרה לפורמט שגיטהאב דורש (Base64 תומך ערבית)
        const encodedContent = btoa(unescape(encodeURIComponent(newFileContent)));

        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Update prices and stock from Admin Panel",
                    content: encodedContent,
                    sha: fileSha
                })
            });

            if(!res.ok) throw new Error("فشل الحفظ. تأكد من الصلاحيات.");
            
            document.getElementById('status-msg').innerText = "🎉 تم الحفظ والنشر بنجاح! سيتم تحديث الموقع خلال ثوانٍ.";
            fetchData(); // טוען מחדש לקבלת ה-SHA החדש
        } catch (e) {
            alert("خطأ: " + e.message);
        } finally {
            btn.innerText = "حفظ التغييرات ونشرها 🚀"; btn.disabled = false;
        }
    }
</script>
</body>
</html>
