<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חנות - ביתי</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .box { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input[type="text"], input[type="password"] { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #C19A5B; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        .item { background: #fafafa; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; text-align: right; }
        .item input { width: 80px; padding: 8px; margin: 0 10px; border: 1px solid #ccc; border-radius: 4px; }
        #status { margin: 15px 0; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h2>התחברות למערכת 🔒</h2>
    <input type="password" id="gh-token" placeholder="הדבק כאן את המפתח (ghp_...)">
    <button onclick="login()">היכנס</button>
</div>

<div id="admin-box" class="box" style="display:none;">
    <button onclick="logout()" style="background:#888; width:auto; float:left; padding:8px 15px;">יציאה</button>
    <div style="clear:both;"></div>
    <h2>פאנל ניהול מוצרים 📦</h2>
    <div id="status"></div>
    <div id="list"></div>
    <button onclick="saveData()" style="background:#222; margin-top:20px;">שמור ופרסם עדכונים 🚀</button>
</div>

<script>
    const REPO = "amirkara17/baiti-shop";
    const PATH = "products.js";
    let prods = [];

    // בדיקה בעליית הדף אם אנחנו כבר מחוברים
    window.onload = () => {
        if(localStorage.getItem('bt_token')) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
            loadData();
        }
    };

    function login() {
        const token = document.getElementById('gh-token').value.trim();
        if (!token.startsWith('ghp_')) {
            alert('מפתח לא תקין. הוא חייב להתחיל ב-ghp_');
            return;
        }
        localStorage.setItem('bt_token', token);
        location.reload();
    }

    function logout() {
        localStorage.removeItem('bt_token');
        location.reload();
    }

    async function loadData() {
        const token = localStorage.getItem('bt_token');
        document.getElementById('status').innerText = "טוען נתונים מהאתר... ⏳";
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
                headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
            });
            if (!res.ok) throw new Error('בעיית הרשאות. ודא שהמפתח הוגדר עם הרשאת repo.');
            
            const data = await res.json();
            // פענוח שפה (ערבית/עברית) מגיטהאב
            const text = decodeURIComponent(escape(atob(data.content)));
            
            // שליפת המערך מתוך הטקסט
            const arrMatch = text.match(/\[[\s\S]*\]/);
            if(arrMatch) {
                prods = eval('(' + arrMatch[0] + ')');
            }

            let html = '';
            prods.forEach((p, i) => {
                html += `
                <div class="item">
                    <strong>${p.name}</strong><br><br>
                    מחיר: <input type="number" value="${p.price}" onchange="prods[${i}].price=Number(this.value)"> ₪
                    &nbsp;|&nbsp; 
                    מלאי: <input type="number" value="${p.stock||0}" onchange="prods[${i}].stock=Number(this.value)">
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
            document.getElementById('status').innerText = "✅ המוצרים נטענו בהצלחה";
        } catch(err) {
            document.getElementById('status').innerText = "❌ שגיאה: " + err.message;
        }
    }

    async function saveData() {
        const token = localStorage.getItem('bt_token');
        document.getElementById('status').innerText = "שומר נתונים בשרת... ⏳";
        try {
            // משיכת הגרסה הכי מעודכנת רגע לפני השמירה (פותר את שגיאת Match)
            const resGet = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
                headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
            });
            const dataGet = await resGet.json();
            const freshSha = dataGet.sha;

            // הכנת הקובץ החדש
            const newContent = `const myProducts = ${JSON.stringify(prods, null, 4)};`;
            const encoded = btoa(unescape(encodeURIComponent(newContent)));

            // שליחת השמירה
            const resPut = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update products via Admin",
                    content: encoded,
                    sha: freshSha
                })
            });

            if(!resPut.ok) throw new Error('השמירה נכשלה');
            document.getElementById('status').innerText = "🎉 נשמר! האתר מתעדכן ברגעים אלו.";
        } catch(err) {
            document.getElementById('status').innerText = "❌ שגיאה בשמירה: " + err.message;
        }
    }
</script>
</body>
</html>
