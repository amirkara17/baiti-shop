<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חנות - ביתי</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .box { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea, select { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
        button { background: #C19A5B; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .item { background: #fafafa; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 8px; text-align: right; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row input { width: 50%; }
        #status { margin: 15px 0; font-weight: bold; color: #333; }
        .add-box { background: #f0faef; border: 2px dashed #4CAF50; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: right;}
        .cat-box { background: #fff5e6; border: 2px dashed #ff9800; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: right;}
        .cat-badge { display: inline-block; background: white; border: 1px solid #ddd; padding: 5px 15px; border-radius: 20px; margin: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h2>התחברות למערכת 🔒</h2>
    <input type="password" id="gh-token" placeholder="הדבק כאן את המפתח (ghp_...)">
    <button onclick="login()">היכנס</button>
</div>

<div id="admin-box" class="box" style="display:none;">
    <button onclick="logout()" style="background:#888; width:auto; float:left; padding:8px 15px;">יציאה</button>
    <div style="clear:both;"></div>
    <h2>פאנל ניהול 📦</h2>
    <div id="status"></div>

    <div class="cat-box">
        <h3 style="margin-top:0; color: #e65100;">🏷️ ניהול קטגוריות (ריבועים במסך הראשי)</h3>
        <div class="flex-row">
            <input type="text" id="new-cat-name" placeholder="שם הקטגוריה (למשל: أكواب)">
            <input type="text" id="new-cat-emoji" placeholder="אימוג'י (למשל: ☕)" style="width:30%;">
            <button onclick="addCategory()" style="background: #ff9800; width:40%;">הוסף ריבוע</button>
        </div>
        <div id="cats-visual-list" style="margin-top:15px; text-align:center;"></div>
    </div>

    <datalist id="cats-list"></datalist>

    <div class="add-box">
        <h3 style="margin-top:0; color: #2e7d32;">✨ הוספת מוצר חדש</h3>
        <input type="text" id="new-name" placeholder="שם המוצר">
        <div class="flex-row">
            <input type="number" id="new-price" placeholder="מחיר (₪)">
            <input type="number" id="new-stock" placeholder="מלאי">
        </div>
        <input type="text" id="new-cat" list="cats-list" placeholder="בחר לאיזה ריבוע/קטגוריה לשייך 🔽">
        <input type="text" id="new-img" placeholder="קישור לתמונה">
        <textarea id="new-desc" placeholder="פירוט על המוצר..." rows="2"></textarea>
        <button onclick="addProduct()" style="background: #4CAF50;">➕ הוסף מוצר</button>
    </div>

    <hr style="border: 1px solid #eee; margin: 30px 0;">
    
    <div id="list"></div>
    <button onclick="saveAllData()" id="save-btn" style="background:#222; margin-top:20px; font-size: 1.2em;">שמור הכל ופרסם באתר 🚀</button>
</div>

<script>
    const REPO = "amirkara17/baiti-shop";
    const PROD_PATH = "products.js";
    const CAT_PATH = "categories.js"; 
    
    let prods = [];
    let cats = [];

    window.onload = () => {
        if(localStorage.getItem('bt_token')) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
            loadData();
        }
    };

    function login() {
        const token = document.getElementById('gh-token').value.trim();
        if (!token.startsWith('ghp_')) return alert('מפתח לא תקין.');
        localStorage.setItem('bt_token', token);
        location.reload();
    }

    function logout() { localStorage.removeItem('bt_token'); location.reload(); }

    async function fetchFile(path) {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${localStorage.getItem('bt_token')}` }
            });
            if (!res.ok) return { data: [], sha: null }; 
            const data = await res.json();
            const text = decodeURIComponent(escape(atob(data.content)));
            const arrMatch = text.match(/\[[\s\S]*\]/);
            return { data: arrMatch ? eval('(' + arrMatch[0] + ')') : [], sha: data.sha };
        } catch (e) { return { data: [], sha: null }; }
    }

    async function loadData() {
        document.getElementById('status').innerText = "טוען נתונים מהאתר... ⏳";
        
        const pRes = await fetchFile(PROD_PATH);
        prods = pRes.data;
        
        const cRes = await fetchFile(CAT_PATH);
        cats = cRes.data;

        renderCategories();
        renderProducts();
        document.getElementById('status').innerText = "✅ הנתונים נטענו";
    }

    function addCategory() {
        const name = document.getElementById('new-cat-name').value;
        const emoji = document.getElementById('new-cat-emoji').value;
        if(!name) return alert("חובה להזין שם קטגוריה!");
        
        cats.push({ name: name, icon: emoji });
        document.getElementById('new-cat-name').value = '';
        document.getElementById('new-cat-emoji').value = '';
        renderCategories();
    }

    function removeCategory(index) {
        if(confirm("למחוק את הקטגוריה הזו? (זה לא ימחק את המוצרים שבתוכה)")) {
            cats.splice(index, 1);
            renderCategories();
        }
    }

    function renderCategories() {
        // התיקון שלנו: אוסף את כל הקטגוריות החדשות + הישנות
        let allCatNames = cats.map(c => c.name);
        
        prods.forEach(p => {
            if (p.category && !allCatNames.includes(p.category)) {
                allCatNames.push(p.category);
            }
        });

        // מעדכן את התפריט הנפתח של המוצרים (הכל יופיע פה עכשיו!)
        document.getElementById('cats-list').innerHTML = allCatNames.map(name => `<option value="${name}">`).join('');
        
        // מעדכן את הריבועים שמוצגים למנהל
        document.getElementById('cats-visual-list').innerHTML = cats.map((c, i) => `
            <div class="cat-badge">
                ${c.icon||''} ${c.name} <span style="color:red; cursor:pointer; margin-right:10px;" onclick="removeCategory(${i})">✖</span>
            </div>
        `).join('');
    }

    function addProduct() {
        const name = document.getElementById('new-name').value;
        const price = document.getElementById('new-price').value;
        if(!name || !price) return alert("חובה להזין שם ומחיר!");

        prods.unshift({
            id: 'prod_' + Date.now(),
            name: name,
            price: Number(price),
            stock: Number(document.getElementById('new-stock').value) || 0,
            category: document.getElementById('new-cat').value,
            image: document.getElementById('new-img').value,
            description: document.getElementById('new-desc').value
        });

        document.querySelectorAll('.add-box input, .add-box textarea').forEach(el => el.value = '');
        renderCategories(); // מרענן את התפריט אם נוספה קטגוריה חדשה ממש עכשיו
        renderProducts();
    }

    function removeProduct(index) {
        if(confirm("האם אתה בטוח שברצונך למחוק מוצר זה?")) {
            prods.splice(index, 1);
            renderCategories(); // מרענן את התפריט למקרה שזו הייתה הקטגוריה היחידה
            renderProducts();
        }
    }

    function renderProducts() {
        let html = '';
        prods.forEach((p, i) => {
            html += `
            <div class="item">
                <div class="flex-row">
                    <input type="text" value="${p.name}" onchange="prods[${i}].name=this.value" style="font-weight:bold;">
                    <button onclick="removeProduct(${i})" style="background:#dc2743; width:auto; padding: 10px;">🗑️</button>
                </div>
                <div class="flex-row">
                    <input type="number" placeholder="מחיר" value="${p.price}" onchange="prods[${i}].price=Number(this.value)">
                    <input type="number" placeholder="מלאי" value="${p.stock||0}" onchange="prods[${i}].stock=Number(this.value)">
                </div>
                <div class="flex-row">
                    <input type="text" list="cats-list" placeholder="קטגוריה" value="${p.category||''}" onchange="prods[${i}].category=this.value; renderCategories();">
                    <input type="text" placeholder="קישור לתמונה" value="${p.image||''}" onchange="prods[${i}].image=this.value">
                </div>
                <textarea placeholder="תיאור המוצר" rows="2" onchange="prods[${i}].description=this.value">${p.description||''}</textarea>
            </div>`;
        });
        document.getElementById('list').innerHTML = html;
    }

    async function saveFile(path, dataArray, varName) {
        const token = localStorage.getItem('bt_token');
        const resGet = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
        let freshSha = null;
        if(resGet.ok) freshSha = (await resGet.json()).sha;

        const newContent = `const ${varName} = ${JSON.stringify(dataArray, null, 4)};`;
        const encoded = btoa(unescape(encodeURIComponent(newContent)));
        
        const body = { message: `Update ${path}`, content: encoded };
        if(freshSha) body.sha = freshSha;

        const resPut = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if(!resPut.ok) throw new Error(`שגיאה בשמירת ${path}`);
    }

    async function saveAllData() {
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = "שומר... ⏳";
        document.getElementById('status').innerText = "מעדכן שרת... ⏳";
        try {
            await saveFile(CAT_PATH, cats, 'myCategories');
            await saveFile(PROD_PATH, prods, 'myProducts');
            
            document.getElementById('status').innerText = "🎉 נשמר בהצלחה! האתר מתעדכן.";
        } catch(err) { 
            document.getElementById('status').innerText = "❌ " + err.message; 
        } finally {
            btn.disabled = false; btn.innerText = "שמור הכל ופרסם באתר 🚀";
        }
    }
</script>
</body>
</html>
