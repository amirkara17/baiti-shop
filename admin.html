<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול חנות</title>
<style>
body { font-family: system-ui; background:#f0f2f5; padding:20px; text-align:center; }
.box { max-width:650px; margin:auto; background:white; padding:20px; border-radius:12px; }
input,textarea { width:90%; padding:10px; margin:8px; }
button { padding:10px 15px; background:#C19A5B; color:white; border:none; cursor:pointer; }
#status { margin:15px; font-weight:bold; }
</style>
</head>

<body>

<div id="login-box" class="box">
<h2>התחברות</h2>
<input type="password" id="gh-token" placeholder="token">
<button onclick="login()">כניסה</button>
</div>

<div id="admin-box" class="box" style="display:none;">
<h2>ניהול מוצרים</h2>
<div id="status"></div>

<input id="new-name" placeholder="שם מוצר">
<input id="new-price" type="number" placeholder="מחיר">
<button onclick="addProduct()">הוסף</button>

<div id="list"></div>

<button onclick="saveAllData()" id="save-btn">פרסם 🚀</button>

</div>

<script>
const REPO = "amirkara17/baiti-shop";
const PROD_PATH = "products.js";

let prods = [];

window.onload = () => {
    if(localStorage.getItem('bt_token')){
        document.getElementById('login-box').style.display='none';
        document.getElementById('admin-box').style.display='block';
        loadData();
    }
};

function login(){
    const t = document.getElementById('gh-token').value;
    localStorage.setItem('bt_token', t);
    location.reload();
}

async function fetchFile(path){
    const token = localStorage.getItem('bt_token');

    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{
        headers:{ 'Authorization':`token ${token}` }
    });

    const txt = await res.text();
    console.log(txt);

    if(!res.ok) throw new Error("שגיאה בטעינה");

    const data = JSON.parse(txt);
    const text = atob(data.content);
    const arr = text.match(/\[[\s\S]*\]/);

    return { data: eval(arr[0]), sha:data.sha };
}

async function loadData(){
    document.getElementById('status').innerText="טוען...";
    try{
        const res = await fetchFile(PROD_PATH);
        prods = res.data;
        render();
        document.getElementById('status').innerText="✅ נטען";
    }catch(e){
        document.getElementById('status').innerText="❌ "+e.message;
    }
}

function render(){
    let html="";
    prods.forEach((p,i)=>{
        html+=`<div>
        <input value="${p.name}" onchange="prods[${i}].name=this.value">
        <input value="${p.price}" type="number" onchange="prods[${i}].price=this.value">
        </div>`;
    });
    document.getElementById('list').innerHTML=html;
}

function addProduct(){
    prods.push({name:document.getElementById('new-name').value,price:Number(document.getElementById('new-price').value)});
    render();
}

async function saveAllData(){
    const token = localStorage.getItem('bt_token');

    const resGet = await fetch(`https://api.github.com/repos/${REPO}/contents/${PROD_PATH}`,{
        headers:{ 'Authorization':`token ${token}` }
    });

    const getData = await resGet.json();

    const content = `const myProducts = ${JSON.stringify(prods,null,4)};`;
    const encoded = btoa(unescape(encodeURIComponent(content)));

    const resPut = await fetch(`https://api.github.com/repos/${REPO}/contents/${PROD_PATH}`,{
        method:'PUT',
        headers:{
            'Authorization':`token ${token}`,
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            message:"update products",
            content:encoded,
            sha:getData.sha
        })
    });

    const txt = await resPut.text();
    console.log(txt);

    if(!resPut.ok){
        document.getElementById('status').innerText="❌ שגיאה";
    }else{
        document.getElementById('status').innerText="🎉 נשמר!";
    }
}
</script>

</body>
</html>
