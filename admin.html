<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חנות - Baiti</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .box {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        h1, h2, h3 { margin-top: 0; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }

        textarea { resize: vertical; }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-main { background: #C19A5B; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-gray { background: #6b7280; color: white; }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .section {
            text-align: right;
            background: #fafafa;
            border: 1px solid #e5e7eb;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .product-card, .category-card {
            text-align: right;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
            background: #fff;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status {
            font-weight: bold;
            margin: 12px 0 20px;
            white-space: pre-wrap;
        }

        .muted {
            color: #6b7280;
            font-size: 13px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .small {
            font-size: 12px;
            color: #6b7280;
        }

        @media (max-width: 700px) {
            .row, .row-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="login-box" class="box" style="max-width: 500px;">
    <h2>כניסה לפאנל ניהול 🔒</h2>
    <input type="password" id="admin-password" placeholder="הכנס סיסמת ניהול">
    <button class="btn-main" onclick="login()" style="width:100%;">כניסה</button>
</div>

<div id="admin-box" class="box" style="display:none;">
    <div class="topbar">
        <h1 style="margin:0;">פאנל ניהול 📦</h1>
        <button class="btn-gray" onclick="logout()">יציאה</button>
    </div>

    <div id="status" class="status"></div>

    <div class="section">
        <h3>🏷️ ניהול קטגוריות</h3>
       
        <div class="row">
            <input type="text" id="new-cat-name" placeholder="שם הקטגוריה">
            <input type="text" id="new-cat-icon" placeholder="אימוג'י, למשל ☕">
        </div>
        <button class="btn-main" onclick="addCategory()" style="margin-top:8px;">הוסף קטגוריה</button>
        <div id="categories-list" style="margin-top:16px;"></div>
    </div>

    <div class="section">
        <h3>✨ הוספת מוצר חדש</h3>
        <input type="text" id="new-name" placeholder="שם המוצר">
   
        <textarea id="new-desc" rows="3" placeholder="תיאור"></textarea>

        <div class="row-3">
            <input type="number" id="new-price" placeholder="מחיר">
            <input type="number" id="new-stock" placeholder="מלאי">
            <input type="text" id="new-image" placeholder="קישורי תמונות (מופרדים בפסיק)">
        </div>

        <input type="text" id="new-category" list="cats-list" placeholder="בחר קטגוריה">
        <datalist id="cats-list"></datalist>

       
        <button class="btn-main" onclick="addProduct()" style="margin-top:8px;">הוסף מוצר</button>
    </div>

    <div class="section">
        <div class="topbar">
            <h3 style="margin:0;">רשימת מוצרים</h3>
            <div style="min-width:220px;">
                <select id="prod-filter" onchange="filterProducts(this.value)">
                    <option value="">הצג הכל</option>
          
                </select>
            </div>
        </div>
        <div id="products-list"></div>
    </div>

    <button id="save-btn" class="btn-main" onclick="saveAllData()" style="width:100%; font-size:16px;">
        שמור הכל ופרסם באתר 🚀
    </button>
</div>

<script>
    let prods = [];
    let cats = [];
    let currentFilter = "";
    let adminPassword = sessionStorage.getItem("admin_password") || "";

    function setStatus(message, isError = false) {
        const el = document.getElementById("status");
        el.innerText = message;
        el.style.color = isError ? "#dc2626" : "#15803d";
    }

    function login() {
        const password = document.getElementById("admin-password").value.trim();
        if (!password) {
            alert("יש להזין סיסמה");
            return;
        }
        adminPassword = password;
        sessionStorage.setItem("admin_password", password);
        document.getElementById("login-box").style.display = "none";
        document.getElementById("admin-box").style.display = "block";
      
        loadData();
    }

    function logout() {
        sessionStorage.removeItem("admin_password");
        location.reload();
    }

    function extractArrayFromJs(text, fileName) {
        const arrMatch = text.match(/\[[\s\S]*\]/);
        if (!arrMatch) throw new Error(`לא הצלחתי לקרוא את ${fileName}`);
        return eval("(" + arrMatch[0] + ")");
    }

    async function fetchTextFile(path) {
        const res = await fetch(`${path}?v=${Date.now()}`);
        const text = await res.text();
        if (!res.ok) throw new Error(`שגיאה בטעינת ${path}`);
        return text;
    }

    function dedupeCategoriesKeepIcons() {
        const map = new Map();
        cats.forEach(cat => {
            if (!cat || !cat.name || !cat.name.trim()) return;

            const name = cat.name.trim();
            const icon = (cat.icon || "").trim() || "📁";

            if (!map.has(name)) {
                map.set(name, { name, icon });
            
            } else {
                const existing = map.get(name);
                if ((existing.icon === "📁" || !existing.icon) && icon !== "📁") {
                    map.set(name, { name, icon });
                }
            }
 
        });

        prods.forEach(p => {
            const name = (p.category || "").trim();
            if (!name) return;
            if (!map.has(name)) {
                map.set(name, { name, icon: "📁" });
            }
        });
        cats = Array.from(map.values());
    }

    async function loadData() {
        try {
            setStatus("טוען נתונים... ⏳");
            const productsText = await fetchTextFile("products.js");
            prods = extractArrayFromJs(productsText, "products.js");

            try {
                const categoriesText = await fetchTextFile("categories.js");
                cats = extractArrayFromJs(categoriesText, "categories.js");
            } catch (_) {
                cats = [];
            }

            dedupeCategoriesKeepIcons();
            renderCategories();
            renderProducts();

            setStatus("✅ הנתונים נטענו בהצלחה");
        } catch (err) {
            console.error(err);
            setStatus("❌ שגיאה בטעינה: " + err.message, true);
            alert("שגיאה בטעינה:\n" + err.message);
        }
    }

    function renderCategories() {
        dedupeCategoriesKeepIcons();
        const catsList = document.getElementById("cats-list");
        catsList.innerHTML = cats.map(c => `<option value="${escapeHtml(c.name)}">`).join("");

        const filter = document.getElementById("prod-filter");
        filter.innerHTML =
            `<option value="">הצג הכל</option>` +
            cats.map(c => `<option value="${escapeHtml(c.name)}" ${currentFilter === c.name ? "selected" : ""}>${escapeHtml(c.name)}</option>`).join("");
        const wrap = document.getElementById("categories-list");
        if (!cats.length) {
            wrap.innerHTML = `<div class="muted">אין קטגוריות כרגע</div>`;
            return;
        }

        wrap.innerHTML = cats.map((c, i) => {
            const count = prods.filter(p => (p.category || "").trim() === c.name).length;
            return `
                <div class="category-card">
                    <div class="row">
              
                        <input type="text" value="${escapeAttr(c.name)}" onchange="updateCategoryName(${i}, this.value)">
                        <input type="text" value="${escapeAttr(c.icon || "📁")}" onchange="cats[${i}].icon=this.value; renderCategories();">
                    </div>
                    <div class="small">מכיל ${count} מוצרים</div>
             
                    <div class="actions" style="margin-top:8px;">
                        <button class="btn-blue" onclick="filterProducts('${jsString(c.name)}')">הצג מוצרים</button>
                        <button class="btn-danger" onclick="removeCategory(${i})">מחק קטגוריה</button>
                    </div>
                </div>
 
            `;
        }).join("");
    }

    function updateCategoryName(index, newValue) {
        const oldName = cats[index].name;
        const newName = newValue.trim();

        if (!newName) {
            alert("שם קטגוריה לא יכול להיות ריק");
            renderCategories();
            return;
        }

        if (cats.some((c, i) => i !== index && c.name === newName)) {
            alert("כבר קיימת קטגוריה בשם הזה");
            renderCategories();
            return;
        }

        cats[index].name = newName;
        prods.forEach(p => {
            if ((p.category || "").trim() === oldName) {
                p.category = newName;
            }
        });
        if (currentFilter === oldName) currentFilter = newName;

        renderCategories();
        renderProducts();
    }

    function addCategory() {
        const name = document.getElementById("new-cat-name").value.trim();
        const icon = document.getElementById("new-cat-icon").value.trim() || "📁";

        if (!name) {
            alert("חובה להזין שם קטגוריה");
            return;
        }

        if (cats.some(c => c.name === name)) {
            alert("הקטגוריה כבר קיימת");
            return;
        }

        cats.push({ name, icon });

        document.getElementById("new-cat-name").value = "";
        document.getElementById("new-cat-icon").value = "";

        renderCategories();
    }

    function removeCategory(index) {
        const catName = cats[index].name;
        const count = prods.filter(p => (p.category || "").trim() === catName).length;

        let msg = `למחוק את הקטגוריה "${catName}"?`;
        if (count > 0) {
            msg += `\nיש ${count} מוצרים בקטגוריה הזאת.
המוצרים לא יימחקו, אבל הקטגוריה תוסר מהם.`;
        }

        if (!confirm(msg)) return;

        cats.splice(index, 1);
        prods.forEach(p => {
            if ((p.category || "").trim() === catName) {
                p.category = "";
            }
        });
        if (currentFilter === catName) currentFilter = "";

        renderCategories();
        renderProducts();
    }

    function addProduct() {
        const name = document.getElementById("new-name").value.trim();
        const description = document.getElementById("new-desc").value.trim();
        const price = Number(document.getElementById("new-price").value);
        const stock = Number(document.getElementById("new-stock").value) || 0;
        
        // חותך את הרשימה לתמונות נפרדות
        const imageInput = document.getElementById("new-image").value;
        const images = imageInput.split(',').map(s=>s.trim()).filter(Boolean);
        const image = images[0] || "";
        
        const category = document.getElementById("new-category").value.trim();

        if (!name) {
            alert("חובה להזין שם מוצר");
            return;
        }

        if (!price && price !== 0) {
            alert("חובה להזין מחיר");
            return;
        }

        prods.unshift({
            id: "prod_" + Date.now(),
            name,
            description,
            price,
            image,
            images,
            category,
            stock
    
        });

        if (category && !cats.some(c => c.name === category)) {
            cats.push({ name: category, icon: "📁" });
        }

        document.getElementById("new-name").value = "";
        document.getElementById("new-desc").value = "";
        document.getElementById("new-price").value = "";
        document.getElementById("new-stock").value = "";
        document.getElementById("new-image").value = "";
        document.getElementById("new-category").value = "";

        renderCategories();
        renderProducts();
    }

    function filterProducts(catName) {
        currentFilter = catName;
        renderProducts();
        renderCategories();
    }

    function removeProduct(index) {
        if (!confirm("למחוק את המוצר?")) return;
        prods.splice(index, 1);
        renderProducts();
        renderCategories();
    }

    function renderProducts() {
        const wrap = document.getElementById("products-list");
        const visibleProducts = prods.filter(p => {
            if (!currentFilter) return true;
            return (p.category || "").trim() === currentFilter;
        });
        if (!visibleProducts.length) {
            wrap.innerHTML = `<div class="muted">אין מוצרים להצגה</div>`;
            return;
        }

        wrap.innerHTML = visibleProducts.map(p => {
            const originalIndex = prods.indexOf(p);
            
            // שולף גם אם זו תמונה בודדת וגם אם זה מערך כדי שיוצג בפאנל
            const currentImages = (p.images && p.images.length) ? p.images.join(',') : (p.image || '');

            return `
                <div class="product-card">
                    <div class="row">
                     
                        <input type="text" value="${escapeAttr(p.name || "")}" onchange="prods[${originalIndex}].name=this.value">
                        <input type="text" value="${escapeAttr(currentImages)}" onchange="const arr = this.value.split(',').map(s=>s.trim()).filter(Boolean); prods[${originalIndex}].images=arr; prods[${originalIndex}].image=arr[0] || '';" placeholder="קישורי תמונות (מופרדים בפסיק)">
                    </div>

                    <textarea rows="3" onchange="prods[${originalIndex}].description=this.value">${escapeTextarea(p.description || "")}</textarea>

                   
                    <div class="row-3">
                        <input type="number" value="${Number(p.price) || 0}" onchange="prods[${originalIndex}].price=Number(this.value)">
                        <input type="number" value="${Number(p.stock) || 0}" onchange="prods[${originalIndex}].stock=Number(this.value)">
                        <input type="text" list="cats-list" value="${escapeAttr(p.category ||
"")}" onchange="onProductCategoryChange(${originalIndex}, this.value)">
                    </div>

                    <div class="actions" style="margin-top:8px;">
                        <button class="btn-danger" onclick="removeProduct(${originalIndex})">מחק מוצר</button>
                    </div>
         
                </div>
            `;
        }).join("");
    }

    function onProductCategoryChange(index, value) {
        const category = value.trim();
        prods[index].category = category;

        if (category && !cats.some(c => c.name === category)) {
            cats.push({ name: category, icon: "📁" });
        
        }

        renderCategories();
        renderProducts();
    }

    async function saveAllData() {
        const btn = document.getElementById("save-btn");
        btn.disabled = true;
        btn.innerText = "שומר... ⏳";

        try {
            dedupeCategoriesKeepIcons();

            setStatus("מעדכן דרך השרת... ⏳");

     
            const response = await fetch("/.netlify/functions/save-admin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    products: prods,
             
                    categories: cats,
                    password: adminPassword
                })
            });
            const text = await response.text();
            let result = null;

            try {
                result = JSON.parse(text);
            } catch (_) {
                result = null;
            }

            if (!response.ok) {
                throw new Error((result && result.message) || text || "Save failed");
            }

            setStatus("🎉 נשמר בהצלחה! רענן את האתר הראשי בעוד כמה שניות.");
            alert("נשמר בהצלחה");
        } catch (err) {
            console.error(err);
            setStatus("❌ שגיאה בשמירה: " + err.message, true);
            alert("שגיאה בשמירה:\n" + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "שמור הכל ופרסם באתר 🚀";
        }
    }

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function escapeAttr(value) {
        return escapeHtml(value).replace(/"/g, "&quot;");
    }

    function escapeTextarea(value) {
        return String(value || "")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function jsString(value) {
        return String(value || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    window.onload = () => {
  
        if (adminPassword) {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("admin-box").style.display = "block";
            loadData();
        } else {
            document.getElementById("login-box").style.display = "block";
            document.getElementById("admin-box").style.display = "none";
        }
    };
</script>

</body>
</html>
