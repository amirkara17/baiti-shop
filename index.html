<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baiti - بيتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #FDFBF7; color: #4A3F35; margin: 0; padding: 0; }
        header { background-color: #FFFFFF; padding: 30px 20px; text-align: center; border-bottom: 2px solid #F0E6D9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        header h1 { margin: 0; color: #C19A5B; font-size: 3.5em; font-weight: 800; letter-spacing: 1px; }
        header p { margin: 10px 0 0 0; color: #8C7B6B; font-size: 1.2em; font-weight: 500; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 30px; align-items: flex-start; }
        .products { flex: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .product-card { background: #FFFFFF; border-radius: 16px; padding: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.04); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #F5F0E6; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
        .product-card h3 { margin: 0 0 8px 0; font-size: 1.4em; color: #332B23; font-weight: 700; }
        .product-card .desc { color: #7A6F64; font-size: 0.95em; margin-bottom: 15px; line-height: 1.5; }
        .product-card .price { font-size: 1.5em; color: #C19A5B; font-weight: 800; margin-bottom: 20px; }
        .btn { background: linear-gradient(135deg, #D6B471, #B88E4B); color: #fff; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: 700; font-size: 1.1em; font-family: 'Tajawal', sans-serif; transition: opacity 0.3s; }
        .btn:hover { opacity: 0.9; }
        .cart-section { flex: 1; min-width: 320px; background: #FFFFFF; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); position: sticky; top: 20px; border: 1px solid #F5F0E6; }
        .cart-section h2 { margin-top: 0; color: #332B23; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px dashed #E0D5C1; padding-bottom: 8px; font-size: 1.05em; font-weight: 500; }
        .form-group { margin-top: 15px; }
        .form-group input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #E0D5C1; border-radius: 8px; box-sizing: border-box; font-family: 'Tajawal', sans-serif; font-size: 1em; background-color: #FDFBF7; }
        .form-group input:focus { outline: none; border-color: #C19A5B; }
        .whatsapp-btn { background: linear-gradient(135deg, #25D366, #1DA851); margin-top: 25px; font-size: 1.2em; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .whatsapp-btn:hover { background: #1DA851; }
        @media (max-width: 768px) { header h1 { font-size: 2.8em; } .cart-section { min-width: 100%; } }
    </style>
</head>
<body>

    <header>
        <h1>Baiti</h1>
        <p>لمسة خاصة لبيتك 🤍 الدفع عند الاستلام</p>
    </header>

    <div class="container">
        <div class="products" id="products-container"></div>

        <div class="cart-section">
            <h2>سلة المشتريات 🛒</h2>
            <div id="cart-items">
                <p style="color: #8C7B6B;">السلة فارغة حالياً.</p>
            </div>
            <h3 style="margin-top: 20px; color: #C19A5B; font-size: 1.6em;">المجموع: <span id="total-price">0</span> ₪</h3>

            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #E0D5C1;">

            <h3 style="color: #332B23;">تفاصيل التوصيل 📦</h3>
            <div class="form-group">
                <input type="text" id="customer-name" placeholder="الاسم الكامل">
            </div>
            <div class="form-group">
                <input type="tel" id="customer-phone" placeholder="رقم الهاتف (05X-XXXXXXX)">
            </div>
            <div class="form-group">
                <input type="text" id="customer-address" placeholder="عنوان التوصيل بالتفصيل (البلد، الشارع)">
            </div>

            <button class="btn whatsapp-btn" onclick="sendOrder()">
                إرسال الطلب عبر الواتساب
            </button>
        </div>
    </div>

    <script>
        // הרשימה המעודכנת עם התמונות שהעלית
        const myProducts = [
            {
                name: "طقم فاخر", // הסט שעולה 170
                description: "طقم مميز وأنيق يضيف لمسة دافئة لضيافتك ولبيتك.",
                price: 170,
                image: "IMG_8630.jpeg"
            },
            {
                name: "قطعة ديكور", // הפריטים שעולים 35
                description: "قطعة فنية جميلة تناسب كل زاوية في البيت (السعر للقطعة الواحدة).",
                price: 35,
                image: "IMG_8631.jpeg"
            }
        ];

        let cart = [];
        let total = 0;

        const container = document.getElementById('products-container');
        myProducts.forEach((product) => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}">
                    <div>
                        <h3>${product.name}</h3>
                        <p class="desc">${product.description}</p>
                        <p class="price">₪${product.price}</p>
                    </div>
                    <button class="btn" onclick="addToCart('${product.name}', ${product.price})">إضافة للسلة</button>
                </div>
            `;
        });

        function addToCart(itemName, itemPrice) {
            cart.push({name: itemName, price: itemPrice});
            total += itemPrice;
            updateCartUI();
        }

        function updateCartUI() {
            const cartDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p style="color: #8C7B6B;">السلة فارغة حالياً.</p>';
            } else {
                cartDiv.innerHTML = '';
                cart.forEach(item => {
                    cartDiv.innerHTML += `
                        <div class="cart-item">
                            <span>${item.name}</span>
                            <span>₪${item.price}</span>
                        </div>
                    `;
                });
            }
            totalSpan.innerText = total;
        }

        function sendOrder() {
            if (cart.length === 0) {
                alert('الرجاء إضافة منتجات للسلة أولاً.');
                return;
            }

            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const address = document.getElementById('customer-address').value;

            if (!name || !phone || !address) {
                alert('الرجاء تعبئة جميع تفاصيل التوصيل (الاسم، الهاتف، والعنوان).');
                return;
            }

            let message = `مرحباً Baiti! 🏠🤍\nأود طلب المنتجات التالية:\n\n`;
            cart.forEach(item => {
                message += `▪️ ${item.name} (₪${item.price})\n`;
            });
            message += `\n💰 المجموع الكلي: ₪${total}\n\n`;
            message += `📦 تفاصيل التوصيل:\nالاسم: ${name}\nالهاتف: ${phone}\nالعنوان: ${address}\n\n* الدفع عند الاستلام 🤝`;

            const whatsappNumber = "972544263633";
            const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
