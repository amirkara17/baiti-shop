<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baiti - بيتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #FDFBF7; color: #4A3F35; margin: 0; padding: 0; }
        header { background-color: #FFFFFF; padding: 35px 20px 25px; text-align: center; border-bottom: 2px solid #F0E6D9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        /* עיצוב הלוגו במקום הטקסט - מראה פסיכי ויוקרתי */
        .main-logo { 
            width: 280px; 
            max-width: 90%; 
            height: auto; 
            margin: 0 auto 15px; 
            display: block; 
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(193, 154, 91, 0.15); /* צללית זהב עדינה */
            transition: transform 0.3s ease;
        }
        .main-logo:hover { transform: scale(1.02); }
        
        header p { margin: 15px 0 0 0; color: #8C7B6B; font-size: 1.2em; font-weight: 500; }
        
        /* עיצוב כפתור האינסטגרם עם הסמל */
        .ig-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 18px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 700; font-size: 1.05em; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .ig-btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        .ig-icon { width: 22px; height: 22px; fill: white; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 30px; align-items: flex-start; }
        
        .products-section { flex: 2; }
        .category-title { color: #C19A5B; border-bottom: 2px solid #F0E6D9; padding-bottom: 10px; margin-bottom: 20px; font-weight: 800; font-size: 1.8em; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; margin-bottom: 40px; }
        
        .product-card { background: #FFFFFF; border-radius: 16px; padding: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.04); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #F5F0E6; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .product-card img { width: 100%; height: 250px; object-fit: contain; border-radius: 12px; margin-bottom: 15px; background-color: #fff; }
        .product-card h3 { margin: 0 0 8px 0; font-size: 1.4em; color: #332B23; font-weight: 700; }
        .product-card .desc { color: #7A6F64; font-size: 0.95em; margin-bottom: 15px; line-height: 1.5; }
        .product-card .price { font-size: 1.5em; color: #C19A5B; font-weight: 800; margin-bottom: 15px; }
        
        .qty-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .qty-wrapper label { color: #8C7B6B; font-size: 0.95em; font-weight: 500; }
        .qty-wrapper input { width: 60px; padding: 8px; text-align: center; border: 1px solid #E0D5C1; border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 1em; color: #4A3F35; background-color: #FDFBF7; }
        .qty-wrapper input:focus { outline: none; border-color: #C19A5B; }

        .btn { background: linear-gradient(135deg, #D6B471, #B88E4B); color: #fff; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: 700; font-size: 1.1em; font-family: 'Tajawal', sans-serif; transition: opacity 0.3s; }
        .btn:hover { opacity: 0.9; }
        
        .cart-section { flex: 1; min-width: 320px; background: #FFFFFF; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); position: sticky; top: 20px; border: 1px solid #F5F0E6; }
        .cart-section h2 { margin-top: 0; color: #332B23; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px dashed #E0D5C1; padding-bottom: 8px; font-size: 1.05em; font-weight: 500; }
        .remove-btn { background: none; border: none; color: #dc2743; cursor: pointer; font-size: 1.1em; padding: 0; margin-left: 10px; transition: 0.2s; }
        .remove-btn:hover { transform: scale(1.2); }
        .item-name-group { display: flex; align-items: center; }

        .form-group { margin-top: 15px; }
        .form-group input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #E0D5C1; border-radius: 8px; box-sizing: border-box; font-family: 'Tajawal', sans-serif; font-size: 1em; background-color: #FDFBF7; }
        .form-group input:focus { outline: none; border-color: #C19A5B; }
        
        .checkout-btn { margin-top: 25px; font-size: 1.2em; display: flex; align-items: center; justify-content: center; gap: 10px; }

        @media (max-width: 768px) { .cart-section { min-width: 100%; } }
    </style>
</head>
<body>

    <header>
        <img src="IMG_8489.jpeg" alt="Baiti Logo" class="main-logo">
        <p>لمسة خاصة لبيتك 🤍 الدفع عند الاستلام</p>
        
        <a href="https://www.instagram.com/baiti.55?igsh=MWo2aHFvOWd3cGF2bg==" target="_blank" class="ig-btn">
            <svg class="ig-icon" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
                <path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/>
            </svg>
            تابعونا على إنستغرام
        </a>
    </header>

    <div class="container">
        <div class="products-section" id="products-container"></div>

        <div class="cart-section">
            <h2>سلة المشتريات 🛒</h2>
            <div id="cart-items">
                <p style="color: #8C7B6B;">السلة فارغة حالياً.</p>
            </div>
            <h3 style="margin-top: 20px; color: #C19A5B; font-size: 1.6em;">المجموع: <span id="total-price">0</span> ₪</h3>

            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #E0D5C1;">

            <h3 style="color: #332B23;">تفاصيل التوصيل 📦</h3>
            <div class="form-group">
                <input type="text" id="customer-name" placeholder="الاسم الكامل">
            </div>
            <div class="form-group">
                <input type="tel" id="customer-phone" placeholder="رقم الهاتف (05X-XXXXXXX)">
            </div>
            <div class="form-group">
                <input type="text" id="customer-address" placeholder="عنوان التوصيل بالتفصيل (البلد، الشارع)">
            </div>

            <button class="btn checkout-btn" onclick="sendOrder()" id="submit-btn">
                إتمام الطلب 🛍️
            </button>
        </div>
    </div>

    <script>
        const myProducts = [
            {
                name: "طقم فاخر", 
                description: "طقم مميز وأنيق يضيف لمسة دافئة لضيافتك ولبيتك.",
                price: 170,
                image: "IMG_8630.jpeg",
                category: "وصل حديثاً ✨" 
            },
            {
                name: "قطعة ديكور", 
                description: "قطعة فنية جميلة تناسب كل زاوية في البيت (السعر للقطعة الواحدة).",
                price: 35,
                image: "IMG_8631.jpeg",
                category: "وصل حديثاً ✨"
            }
        ];

        let cart = [];
        let total = 0;

        const container = document.getElementById('products-container');
        const categories = [...new Set(myProducts.map(p => p.category))];
        
        categories.forEach(category => {
            container.innerHTML += `<h2 class="category-title">${category}</h2>`;
            
            let productsHTML = '<div class="products">';
            myProducts.forEach((product, index) => {
                if(product.category === category) {
                    productsHTML += `
                        <div class="product-card">
                            <img src="${product.image}" alt="${product.name}">
                            <div>
                                <h3>${product.name}</h3>
                                <p class="desc">${product.description}</p>
                                <p class="price">₪${product.price}</p>
                                <div class="qty-wrapper">
                                    <label>الكمية:</label>
                                    <input type="number" id="qty-${index}" value="1" min="1">
                                </div>
                            </div>
                            <button class="btn" onclick="addToCart(${index})">إضافة للسلة</button>
                        </div>
                    `;
                }
            });
            productsHTML += '</div>';
            container.innerHTML += productsHTML;
        });

        function addToCart(index) {
            const product = myProducts[index];
            const qtyInput = document.getElementById(`qty-${index}`);
            const quantity = parseInt(qtyInput.value);

            if (quantity > 0) {
                const existingItem = cart.find(item => item.name === product.name);
                if (existingItem) {
                    existingItem.quantity += quantity;
                } else {
                    cart.push({name: product.name, price: product.price, quantity: quantity});
                }
                
                total += (product.price * quantity);
                updateCartUI();
                qtyInput.value = 1; 
            }
        }

        function removeFromCart(index) {
            total -= (cart[index].price * cart[index].quantity); 
            cart.splice(index, 1); 
            updateCartUI(); 
        }

        function updateCartUI() {
            const cartDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p style="color: #8C7B6B;">السلة فارغة حالياً.</p>';
            } else {
                cartDiv.innerHTML = '';
                cart.forEach((item, index) => {
                    cartDiv.innerHTML += `
                        <div class="cart-item">
                            <div class="item-name-group">
                                <button class="remove-btn" onclick="removeFromCart(${index})" title="إزالة">🗑️</button>
                                <span>${item.name} (x${item.quantity})</span>
                            </div>
                            <span>₪${item.price * item.quantity}</span>
                        </div>
                    `;
                });
            }
            totalSpan.innerText = total;
        }

        function sendOrder() {
            if (cart.length === 0) {
                alert('الرجاء إضافة منتجات للسلة أولاً.');
                return;
            }

            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const address = document.getElementById('customer-address').value;

            if (!name || !phone || !address) {
                alert('الرجاء تعبئة جميع تفاصيل التوصيل (الاسم، الهاتف، والعنوان).');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerText = "جاري إرسال الطلب...";
            btn.disabled = true;

            let orderDetails = "";
            cart.forEach(item => {
                orderDetails += `- ${item.name} (الكمية: ${item.quantity}) - ₪${item.price * item.quantity}\n`;
            });

            fetch("https://formsubmit.co/ajax/amirkara99@gmail.com", {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    "اسم الزبون": name,
                    "رقم الهاتف": phone,
                    "العنوان": address,
                    "تفاصيل الطلب": orderDetails,
                    "المجموع الكلي": "₪" + total,
                    "_subject": "طلب جديد من متجر Baiti! 🏠"
                })
            })
            .then(response => response.json())
            .then(data => {
                alert("شكراً لك! تم استلام طلبك بنجاح وسنتواصل معك قريباً لتأكيد التوصيل. 🤍");
                
                cart = [];
                total = 0;
                updateCartUI();
                document.getElementById('customer-name').value = "";
                document.getElementById('customer-phone').value = "";
                document.getElementById('customer-address').value = "";
                
                btn.innerText = "إتمام الطلب 🛍️";
                btn.disabled = false;
            })
            .catch(error => {
                alert("حدث خطأ في الإرسال، يرجى المحاولة مرة أخرى.");
                btn.innerText = "إتمام الطلب 🛍️";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
