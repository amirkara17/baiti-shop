<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baiti</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body { margin:0; font-family:'Tajawal', sans-serif; background:#FAF8F5; text-align:center; }
.top { padding:20px; font-size:24px; font-weight:bold; }
.products { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:15px; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; }
button { padding:10px; background:#C19A5B; color:white; border:none; cursor:pointer; border-radius:6px; }
</style>
</head>

<body>

<div class="top">Baiti</div>

<div id="categories"></div>
<div class="products" id="products"></div>

<script>
const __v = Date.now();
document.write(`<script src="categories.js?v=${__v}"><\/script>`);
document.write(`<script src="products.js?v=${__v}"><\/script>`);

let cart = [];
let total = 0;

function renderCategories(){
    let div = document.getElementById('categories');
    div.innerHTML = "";

    myCategories.forEach(c=>{
        div.innerHTML += `<button onclick="showCategory('${c.name}')">${c.icon} ${c.name}</button>`;
    });

    div.innerHTML += `<button onclick="showCategory('all')">✨ جميع المنتجات</button>`;
}

function showCategory(cat){
    let div = document.getElementById('products');
    div.innerHTML = "";

    myProducts.forEach((p,i)=>{
        if(cat==='all' || p.category===cat){
            div.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <img src="${p.image}" width="150">
                <p>${p.description}</p>
                <b>${p.price} ₪</b><br>
                <button onclick="add(${i})">إضافة</button>
            </div>`;
        }
    });
}

function add(i){
    const p = myProducts[i];
    cart.push({name:p.name, price:p.price, quantity:1});
    total += p.price;
    alert("تمت الإضافة");
}

async function sendOrderSecure(){
    const customerDetails = {
        name: prompt("الاسم"),
        phone: prompt("الهاتف"),
        addr: prompt("العنوان")
    };

    const res = await fetch('/.netlify/functions/submit',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ items:cart, customerDetails })
    });

    const data = await res.json();

    alert("تم الطلب ✔");
    cart=[];
    total=0;
}

window.onload=()=>{
    renderCategories();
    showCategory('all');
};
</script>

</body>
</html>
