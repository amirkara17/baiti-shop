<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="theme-color" content="#FAF8F5">
    
    <title>Baiti - بيتي</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }

        :root {
            --primary: #C19A5B; 
            --dark: #2c251f; 
            --light: #FAF8F5; 
            --white: #ffffff;
            --gray: #8C7B6B;
            --danger: #dc2743;
        }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--light) !important; color: var(--dark) !important; margin: 0; padding: 0; overflow-x: hidden; width: 100%; position: relative; }
        
        .top-navbar { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
        .menu-icon-btn, .cart-icon-btn { background: none; border: none; font-size: 1.6em; cursor: pointer; color: var(--dark); transition: 0.3s; position: relative; padding: 0; }
        .nav-logo-text { font-weight: 800; color: var(--dark); font-size: 1.6em; letter-spacing: 1px; cursor: pointer; }
        .cart-badge { background-color: var(--primary); color: var(--white); font-size: 0.45em; font-weight: 800; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; position: absolute; top: -8px; right: -12px; border: 2px solid var(--white); }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 1001; display: none; opacity: 0; transition: 0.3s; }
        .menu-overlay.active { display: block; opacity: 1; }
        
        .menu-drawer { position: fixed; top: 0; right: -100%; width: 300px; max-width: 85vw; height: 100%; height: 100dvh; background: var(--white) !important; z-index: 1002; box-shadow: -5px 0 30px rgba(0,0,0,0.1); transition: right 0.4s ease; padding: 30px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .menu-drawer.active { right: 0; }
        
        .close-menu { background: none; border: none; font-size: 2.2em; color: var(--gray); cursor: pointer; position: absolute; top: 20px; left: 20px; line-height: 1; transition: 0.2s; padding: 10px; z-index: 10; }
        
        .menu-list { list-style: none; padding: 0; margin-top: 50px; }
        .menu-list li { padding: 18px 10px; border-bottom: 1px solid #f0f0f0; font-size: 1.2em; font-weight: 700; color: var(--dark); cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }

        .hero-section { background-color: var(--light); padding: 40px 20px; text-align: center; border-bottom: 1px solid #EAE3D9; }
        .main-logo { width: 280px; max-width: 85%; height: auto; margin: 0 auto; display: block; mix-blend-mode: multiply; }
        .hero-subtitle { margin: 15px 0 0 0; color: var(--gray); font-size: 1.1em; font-weight: 500; }
        .ig-link { color: var(--gray); text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 500; transition: 0.3s; justify-content: center; margin-top: 20px; }
        
        .home-categories { max-width: 1000px; margin: 30px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .category-card { background: var(--white); border-radius: 12px; padding: 25px 15px; text-align: center; cursor: pointer; border: 1px solid #EAE3D9; box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.3s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 120px; }
        .category-card h2 { margin: 0; color: var(--dark); font-size: 1.3em; line-height: 1.3; }

        .all-products-card { grid-column: 1 / -1; border: 2px solid var(--primary); background: #fdfbf7; min-height: 100px; }
        .all-products-card h2 { color: var(--primary); font-size: 1.6em; }

        .category-view { display: none; max-width: 1200px; margin: 0 auto; padding: 30px 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .back-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 20px; border-radius: 25px; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 1em; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .category-title-header { margin: 0 0 30px 0; color: var(--dark); font-size: 2em; text-align: right; border-bottom: 2px solid #EAE3D9; padding-bottom: 15px; }

        .floating-back-btn { position: fixed; bottom: 20px; left: 20px; background-color: var(--dark); color: var(--white); border: none; border-radius: 50px; padding: 12px 25px; font-family: inherit; font-weight: 700; font-size: 1em; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 90; display: none; align-items: center; gap: 8px; transition: 0.3s; }

        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .product-card { background: var(--white); border-radius: 12px; text-align: right; transition: 0.4s ease; overflow: hidden; position: relative; border: 1px solid #EAE3D9; display: flex; flex-direction: column; }
        
        .like-btn { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 1.2em; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; transition: 0.2s; }
        
        /* --- עודכן כדי לאפשר קרוסלה --- */
        .img-wrapper { width: 100%; aspect-ratio: 1 / 1; background-color: var(--white); display: flex; overflow-x: auto; scroll-snap-type: x mandatory; border-bottom: 1px solid #f5f5f5; position: relative; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .img-wrapper::-webkit-scrollbar { display: none; }
        .img-wrapper img { flex: 0 0 100%; scroll-snap-align: center; width: 100%; height: 100%; object-fit: contain; padding: 10px; box-sizing: border-box; }
        /* ------------------------------- */

        .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-info h3 { margin: 0 0 5px 0; font-size: 1.3em; color: var(--dark); font-weight: 700; }
        .product-desc { color: var(--gray); font-size: 0.9em; margin: 0 0 15px 0; line-height: 1.5; }
        
        .stock-warning { background-color: #fff3e0; color: #e65100; padding: 6px 10px; border-radius: 6px; font-size: 0.85em; font-weight: bold; text-align: center; border: 1px dashed #ffb74d; margin-bottom: 12px; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; }
        .price { color: var(--primary); font-weight: 800; font-size: 1.4em; }
        .qty-control { display: flex; align-items: center; border: 1px solid #EAE3D9; border-radius: 8px; background: #fcfbf9; }
        .qty-btn { background: none; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; color: var(--primary); }
        .qty-input { width: 35px; text-align: center; border: none; background: none; font-weight: 800; }
        .btn-add { background: var(--dark); color: var(--white); border: none; width: 100%; padding: 12px; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: 700; font-size: 1.1em; font-family: inherit; }

        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 999; display: none; }
        .cart-overlay.active { display: block; }

        .cart-drawer { position: fixed; top: 0; right: -100%; width: 350px; max-width: 90vw; height: 100%; height: 100dvh; background: white; z-index: 1000; transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1); padding: 20px; padding-bottom: calc(30px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; overflow-y: auto; }
        .cart-drawer.active { right: 0; }
        
        .checkout-form input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1em; }
        .cart-total { font-size: 1.4em; color: var(--primary); font-weight: 800; display: flex; justify-content: space-between; border-top: 2px solid #EAE3D9; padding-top: 20px; margin-bottom: 25px; }

        .success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 3000; display: none; align-items: center; justify-content: center; text-align: center; color: white; }
        .success-overlay.active { display: flex; }
        .success-box { background: white; padding: 40px; border-radius: 20px; max-width: 80%; }
        
        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--dark); color: var(--white); padding: 12px 25px; border-radius: 30px; font-weight: 500; font-size: 1em; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.4s ease; z-index: 2000; display: flex; align-items: center; gap: 10px; }
        .toast.show { bottom: 30px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <script src="categories.js" onerror="window.myCategories = []"></script>
    <script src="products.js"></script>

    <script type="text/javascript">
        (function(){
            emailjs.init("QqHFcLgfCh5t0YfEw"); 
        })();
    </script>

    <div class="top-navbar">
        <button class="menu-icon-btn" onclick="toggleMenu()">☰</button>
        <span class="nav-logo-text" onclick="goHome()">Baiti</span>
        
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="menu-icon-btn" onclick="openWishlist()" style="font-size:1.4em;">❤️</button>
            <div style="position:relative; cursor:pointer;" onclick="toggleCart()">
                🛒 <span class="cart-badge" id="cart-count">0</span>
            </div>
        </div>
    </div>

    <div id="home-view">
        <div class="hero-section">
            <img src="IMG_8489.jpeg" class="main-logo">
            <p class="hero-subtitle">لمسة خاصة لبيتك 🤍 הדפסה על הכל</p>
            <a href="https://www.instagram.com/baiti.55/" target="_blank" class="ig-link">
                تابعونا على الانستجرام
            </a>
        </div>
        <div class="home-categories" id="home-categories">
            <div class="category-card all-products-card" onclick="openCategory('all')">
                <h2>✨ جميع المنتجات ✨</h2>
                <p>اضغط لعرض כל הקולקציה</p>
            </div>
        </div>
    </div>

    <div id="category-view" class="category-view">
        <button class="back-btn" onclick="goHome()"><span>➔</span> العودة للقائمة الرئيسية</button>
        <h2 class="category-title-header" id="current-category-title"></h2>
        <div class="products" id="products-container"></div>
    </div>

    <div id="wishlist-view" class="category-view">
        <button class="back-btn" onclick="goHome()"><span>➔</span> العودة للقائمة الرئيسية</button>
        <h2 class="category-title-header">المفضلة ❤️</h2>
        <div class="products" id="wishlist-container"></div>
    </div>

    <button class="floating-back-btn" id="floating-back" onclick="goHome()"><span>➔</span> رجوع</button>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>السلة 🛒</h2>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:2em; cursor:pointer; color:var(--gray);">×</button>
        </div>
        <div id="cart-items" style="flex-grow:1; overflow-y:auto; margin-top:20px; padding-bottom:15px;"></div>
        <div style="padding-bottom: 20px;">
            <div class="cart-total">
                <span>المجموع:</span>
                <span id="total-price">0 ₪</span>
            </div>
            <div class="checkout-form">
                <input type="text" id="c-name" placeholder="الاسم الكامل">
                <input type="tel" id="c-phone" placeholder="رقم الهاتف">
                <input type="email" id="c-email" placeholder="البريد الإلكتروني (اختياري)">
                <input type="text" id="c-addr" placeholder="عنوان التوصيل">
                <button class="btn-add" id="submit-btn" onclick="sendOrderSecure()">إتمام الطلب</button>
            </div>
        </div>
    </div>

    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="menu-drawer" id="menu-drawer">
        <button class="close-menu" onclick="toggleMenu()">×</button>
        <h2 style="color: var(--dark); margin-top: 0; border-bottom: 2px solid #EAE3D9; padding-bottom: 15px;">القائمة</h2>
        <ul class="menu-list" id="dynamic-menu-list">
            <li onclick="goHome(); toggleMenu()"><span style="color: #C19A5B;">🏠</span> الرئيسية</li>
            <li onclick="openCategory('all'); toggleMenu()"><span style="color: #4CAF50;">🛍️</span> جميع المنتجات</li>
        </ul>
    </div>

    <div class="success-overlay" id="success-overlay">
        <div class="success-box">
            <div style="font-size:4em;">✨</div>
            <h2 style="color:var(--primary); margin:10px 0;">شكراً لك!</h2>
            <p style="color:var(--dark); margin-bottom:25px;">تم استلام طلبך بنجاح 🤍</p>
            <button onclick="location.reload()" style="background:var(--dark); color:white; border:none; padding:12px 30px; border-radius:50px; cursor:pointer; font-weight:700;">العودة للمתجر</button>
        </div>
    </div>

    <div class="toast" id="toast">✔️ تمت إضافة المنتج</div>

    <script>
        let cart = []; let wishlist = []; let total = 0;

        window.addEventListener('scroll', function() {
            var fb = document.getElementById('floating-back');
            if (document.getElementById('home-view').style.display === 'none' && window.scrollY > 150) fb.style.display = 'flex';
            else fb.style.display = 'none';
        });

        window.addEventListener('popstate', function(event) {
            document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
            if (event.state) {
                if (event.state.view === 'category') openCategory(event.state.name, false, true);
                else if (event.state.view === 'wishlist') openWishlist(false, true);
                else goHome(true);
            } else goHome(true);
        });

        function init() {
            history.replaceState({ view: 'home' }, '', window.location.pathname);
            const container = document.getElementById('home-categories');
            const menuContainer = document.getElementById('dynamic-menu-list');
            let categoriesToRender = (typeof myCategories !== 'undefined' && myCategories.length > 0) ? myCategories : [];
            
            categoriesToRender.forEach(c => {
                container.innerHTML += `<div class="category-card" onclick="openCategory('${c.name}')"><div style="font-size: 2.2em; margin-bottom: 8px;">${c.icon || ''}</div><h2>${c.name}</h2></div>`;
                menuContainer.innerHTML += `<li onclick="openCategory('${c.name}'); toggleMenu()"><span>${c.icon || '✨'}</span> ${c.name}</li>`;
            });
        }

        function toggleMenu() { 
            const d = document.getElementById('menu-drawer');
            if (!d.classList.contains('active')) {
                history.pushState({ modal: 'menu' }, '', '#menu');
                d.classList.add('active'); document.getElementById('menu-overlay').classList.add('active');
            } else { d.classList.remove('active'); document.getElementById('menu-overlay').classList.remove('active'); }
        }

        function toggleCart() { 
            const d = document.getElementById('cart-drawer');
            if (!d.classList.contains('active')) {
                history.pushState({ modal: 'cart' }, '', '#cart');
                d.classList.add('active'); document.getElementById('cart-overlay').classList.add('active');
            } else { d.classList.remove('active'); document.getElementById('cart-overlay').classList.remove('active'); }
        }

        function renderProductCard(p, i) {
            const heart = wishlist.includes(i) ? '❤️' : '🤍';
            const stock = p.stock !== undefined ? p.stock : 100;
            const descHtml = p.description ? `<div class="product-desc">${p.description}</div>` : '';
            const likeBtnHtml = `<button id="like-btn-${i}" class="like-btn" onclick="toggleLike(${i})">${heart}</button>`;

            // --- מנגנון תמונות מרובות ---
            const imgs = (p.images && p.images.length > 0) ? p.images : (p.image ? [p.image] : []);
            const imgsHtml = imgs.map(src => `<img src="${src}">`).join('');
            // ---------------------------

            if (stock === 0) {
                return `<div class="product-card">
                    ${likeBtnHtml}
                    <div class="img-wrapper">${imgsHtml}</div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        ${descHtml}
                        <div style="color:var(--danger); font-weight:bold; margin-top:auto; padding-top:10px;">نفدت الكمية حالياً 💔</div>
                        <div class="price-row"><span class="price">₪${p.price}</span></div>
                        <button class="btn-add" disabled style="background:#e0e0e0; color:#999;">نفدت الكمية</button>
                    </div>
                </div>`;
            }

            let stockWarningHtml = (stock > 0 && stock <= 2) ? `<div class="stock-warning">سارعوا! تبقى ${stock} فقط 🔥</div>` : '';

            return `<div class="product-card">
                ${likeBtnHtml}
                <div class="img-wrapper">${imgsHtml}</div>
                <div class="product-info">
                    <h3>${p.name}</h3>
                    ${descHtml}
                    ${stockWarningHtml}
                    <div class="price-row">
                        <span class="price">₪${p.price}</span>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateQty(${i},-1)">-</button>
                            <input id="q-${i}" class="qty-input" value="1" readonly>
                            <button class="qty-btn" onclick="updateQty(${i},1)">+</button>
                        </div>
                    </div>
                    <button class="btn-add" onclick="add(${i})">إضافة للسلة 🛒</button>
                </div>
            </div>`;
        }

        function openCategory(name, scroll = false, hist = false) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('wishlist-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
            document.getElementById('current-category-title').innerText = name === 'all' ? "جميع المنتجات" : name;
            const container = document.getElementById('products-container'); container.innerHTML = '';
            myProducts.forEach((p, i) => { if(name === 'all' || p.category === name) container.innerHTML += renderProductCard(p, i); });
            if (!hist) history.pushState({ view: 'category', name: name }, '', '#category');
            if (!scroll) window.scrollTo(0,0);
        }

        function openWishlist(scroll = false, hist = false) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('wishlist-view').style.display = 'block';
            const container = document.getElementById('wishlist-container'); container.innerHTML = '';
            if(wishlist.length === 0) container.innerHTML = '<p style="text-align:center; width:100%;">المفضلة فارغة حالياً 🤍</p>';
            else wishlist.forEach(i => container.innerHTML += renderProductCard(myProducts[i], i));
            if (!hist) history.pushState({ view: 'wishlist' }, '', '#wishlist');
            if (!scroll) window.scrollTo(0, 0);
        }

        function toggleLike(i) {
            const idx = wishlist.indexOf(i);
            if (idx > -1) { wishlist.splice(idx, 1); showToast("تمت الإزالة 🤍"); }
            else { wishlist.push(i); showToast("تم الحفظ ❤️"); }
            
            const btn = document.getElementById(`like-btn-${i}`);
            if (btn) btn.innerText = idx > -1 ? '🤍' : '❤️';
            if (document.getElementById('wishlist-view').style.display === 'block' && idx > -1) { 
                let currentScroll = window.scrollY; openWishlist(true, true); window.scrollTo(0, currentScroll); 
            }
        }

        function updateQty(i, d) {
            let el = document.getElementById(`q-${i}`);
            let v = parseInt(el.value) + d;
            const max = myProducts[i].stock !== undefined ? myProducts[i].stock : 100;
            if(v >= 1 && v <= max) el.value = v;
        }

        function add(i) {
            const p = myProducts[i]; const q = parseInt(document.getElementById(`q-${i}`).value);
            const exist = cart.find(x => x.name === p.name);
            if(exist) exist.quantity += q; else cart.push({name:p.name, price:p.price, quantity:q});
            total += (p.price * q); updateUI();
            showToast("✔️ تمت الإضافة");
        }

        function updateUI() {
            const div = document.getElementById('cart-items'); div.innerHTML = cart.length ? '' : '<p>السلة فارغة</p>';
            cart.forEach((item, i) => div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span>${item.name} (${item.quantity})</span><span>₪${item.price*item.quantity}</span></div>`);
            document.getElementById('total-price').innerText = total + ' ₪';
            document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.quantity,0);
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function goHome(hist = false) {
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('wishlist-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            if (!hist) history.pushState({ view: 'home' }, '', window.location.pathname);
            window.scrollTo(0,0);
        }

        async function sendOrderSecure() {
            const customerDetails = {
                name: document.getElementById('c-name').value,
                phone: document.getElementById('c-phone').value,
                addr: document.getElementById('c-addr').value
            };

            if(!customerDetails.name || !customerDetails.phone || cart.length === 0) {
                alert("נא למלא את כל הפרטים"); return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "מעבד הזמנה מאובטחת... ⏳";

            try {
                const response = await fetch('/.netlify/functions/submit', {
                    method: 'POST',
                    body: JSON.stringify({ items: cart, customerDetails })
                });

                if (!response.ok) throw new Error();
                const result = await response.json();

                const params = {
                    customer_name: customerDetails.name,
                    customer_phone: customerDetails.phone,
                    customer_address: customerDetails.addr,
                    order_details: result.summary,
                    total_amount: result.totalPrice + " ₪"
                };

                await emailjs.send('service_rx74wyj', 'template_2oma7tb', params);
                
                toggleCart();
                document.getElementById('success-overlay').classList.add('active');
                if(typeof confetti === 'function') confetti();
                cart = []; total = 0; updateUI();
            } catch (err) {
                alert("שגיאה בעיבוד ההזמנה. נסה שנית.");
            } finally {
                btn.disabled = false; btn.innerText = "إتمام الطلب";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
