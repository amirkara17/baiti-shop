<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="theme-color" content="#FAF8F5">
    
    <title>Baiti - بيتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* חסימת בחירת טקסט כדי למנוע העתקות */
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        /* מאפשר בחירת טקסט רק בתוך שדות ההקלדה של הלקוח */
        input, textarea { -webkit-user-select: text; user-select: text; }

        :root {
            --primary: #C19A5B; 
            --dark: #2c251f; 
            --light: #FAF8F5; 
            --white: #ffffff;
            --gray: #8C7B6B;
            --danger: #dc2743;
            --warning: #d97706;
        }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--light) !important; color: var(--dark) !important; margin: 0; padding: 0; overflow-x: hidden; width: 100%; position: relative; }
        
        .top-navbar { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
        .menu-icon-btn, .cart-icon-btn { background: none; border: none; font-size: 1.6em; cursor: pointer; color: var(--dark); transition: 0.3s; position: relative; }
        .nav-logo-text { font-weight: 800; color: var(--dark); font-size: 1.6em; letter-spacing: 1px; cursor: pointer; }
        .cart-badge { background-color: var(--primary); color: var(--white); font-size: 0.45em; font-weight: 800; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; position: absolute; top: -8px; right: -12px; border: 2px solid var(--white); }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 1001; display: none; opacity: 0; transition: 0.3s; }
        .menu-overlay.active { display: block; opacity: 1; }
        
        .menu-drawer { position: fixed; top: 0; right: -100%; width: 300px; max-width: 85vw; height: 100vh; background: var(--white) !important; z-index: 1002; box-shadow: -5px 0 30px rgba(0,0,0,0.1); transition: right 0.4s ease; padding: 30px 20px; display: flex; flex-direction: column; }
        .menu-drawer.active { right: 0; }
        
        .close-menu { background: none; border: none; font-size: 2.2em; color: var(--gray); cursor: pointer; position: absolute; top: 20px; left: 20px; line-height: 1; transition: 0.2s; padding: 10px; z-index: 10; }
        
        .menu-list { list-style: none; padding: 0; margin-top: 50px; }
        .menu-list li { padding: 18px 10px; border-bottom: 1px solid #f0f0f0; font-size: 1.2em; font-weight: 700; color: var(--dark); cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }

        .hero-section { background-color: var(--light); padding: 40px 20px; text-align: center; border-bottom: 1px solid #EAE3D9; }
        .main-logo { width: 280px; max-width: 85%; height: auto; margin: 0 auto; display: block; mix-blend-mode: multiply; }
        .hero-subtitle { margin: 15px 0 0 0; color: var(--gray); font-size: 1.1em; font-weight: 500; }
        
        .home-categories { max-width: 1000px; margin: 30px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .category-card { background: var(--white); border-radius: 12px; padding: 25px 15px; text-align: center; cursor: pointer; border: 1px solid #EAE3D9; box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.3s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 120px; }
        .category-card h2 { margin: 0; color: var(--dark); font-size: 1.3em; line-height: 1.3; }

        .all-products-card { grid-column: 1 / -1; border: 2px solid var(--primary); background: #fdfbf7; min-height: 100px; }
        .all-products-card h2 { color: var(--primary); font-size: 1.6em; }

        .category-view { display: none; max-width: 1200px; margin: 0 auto; padding: 30px 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .back-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 20px; border-radius: 25px; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 1em; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .category-title-header { margin: 0 0 30px 0; color: var(--dark); font-size: 2em; text-align: right; border-bottom: 2px solid #EAE3D9; padding-bottom: 15px; }

        .floating-back-btn { position: fixed; bottom: 20px; left: 20px; background-color: var(--dark); color: var(--white); border: none; border-radius: 50px; padding: 12px 25px; font-family: inherit; font-weight: 700; font-size: 1em; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 90; display: none; align-items: center; gap: 8px; transition: 0.3s; }

        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .product-card { background: var(--white); border-radius: 12px; text-align: right; transition: 0.4s ease; overflow: hidden; position: relative; border: 1px solid #EAE3D9; display: flex; flex-direction: column; }
        
        .like-btn { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 1.2em; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; transition: 0.2s; }

        .img-wrapper { width: 100%; aspect-ratio: 1 / 1; background-color: var(--white); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f5f5f5; position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: contain; padding: 10px; box-sizing: border-box; transition: transform 0.6s ease; }
        
        .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-info h3 { margin: 0 0 10px 0; font-size: 1.3em; color: var(--dark); font-weight: 700; }
        .product-info .desc { color: var(--gray); font-size: 0.95em; margin-bottom: auto; line-height: 1.6; min-height: 45px; }
        
        .stock-status { font-weight: 800; font-size: 0.9em; margin: 15px 0 5px 0; }
        .stock-out { color: var(--danger); }
        .stock-low { color: var(--warning); }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-top: 1px solid #f0f0f0; padding-top: 15px; margin-top: 10px; }
        .price-row .price { font-size: 1.4em; color: var(--primary); font-weight: 800; }
        
        .qty-wrapper { display: flex; align-items: center; gap: 8px; }
        .qty-control { display: flex; align-items: center; border: 1px solid #EAE3D9; border-radius: 8px; overflow: hidden; background: #fcfbf9; direction: ltr; }
        .qty-btn { background: transparent; border: none; width: 32px; height: 32px; font-size: 1.3em; font-weight: bold; cursor: pointer; color: var(--primary); transition: 0.2s; display: flex; align-items: center; justify-content: center; padding: 0; }
        .qty-input { width: 35px; height: 32px; border: none; text-align: center; font-size: 1.1em; font-weight: 800; color: var(--dark); background: transparent; pointer-events: none; padding: 0; margin: 0; }

        .btn-add { background: var(--dark); color: var(--white); border: none; padding: 12px 20px; cursor: pointer; width: 100%; font-weight: 700; font-size: 1.1em; font-family: inherit; transition: 0.3s; border-radius: 8px; }
        .btn-add:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }

        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--dark); color: var(--white); padding: 12px 25px; border-radius: 30px; font-weight: 500; font-size: 1em; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.4s ease; z-index: 2000; display: flex; align-items: center; gap: 10px; }
        .toast.show { bottom: 30px; }

        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 999; display: none; opacity: 0; transition: 0.3s; }
        .cart-overlay.active { display: block; opacity: 1; }
        
        .cart-drawer { position: fixed; top: 0; right: -100%; width: 400px; max-width: 100vw; height: 100vh; background: var(--white) !important; z-index: 1000; box-shadow: -5px 0 30px rgba(0,0,0,0.1); transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1); padding: 25px 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .cart-drawer.active { right: 0; }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EAE3D9; padding-bottom: 15px; margin-bottom: 20px; width: 100%; }
        .cart-header h2 { margin: 0; color: var(--dark); font-size: 1.5em; }
        .close-cart { background: none; border: none; font-size: 2.2em; color: var(--gray); cursor: pointer; padding: 5px; line-height: 1; transition: 0.2s; display: block; }
        
        .cart-items-container { flex-grow: 1; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #f5f5f5; padding-bottom: 15px; }
        .item-info { display: flex; flex-direction: column; gap: 5px; }
        .item-name { font-weight: 700; color: var(--dark); }
        .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2em; padding: 5px; transition: 0.2s; }
        
        .cart-total { font-size: 1.4em; color: var(--primary); font-weight: 800; display: flex; justify-content: space-between; border-top: 2px solid #EAE3D9; padding-top: 20px; margin-bottom: 25px; }

        .checkout-form { background: var(--light) !important; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 1em; background-color: var(--white) !important; color: var(--dark) !important; transition: 0.3s; }
        .btn-checkout { background: var(--primary); color: var(--white); border: none; padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 800; font-size: 1.2em; margin-top: 10px; transition: 0.3s; }

        .ig-link { color: var(--gray); text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 500; transition: 0.3s; justify-content: center; margin-top: 20px; }

        .success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 3000; display: none; opacity: 0; transition: 0.4s; align-items: center; justify-content: center; }
        .success-overlay.active { display: flex; opacity: 1; }
        .success-box { background: var(--white); padding: 40px 30px; border-radius: 20px; text-align: center; max-width: 90%; width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); transform: scale(0.8); transition: 0.4s; }
        .success-overlay.active .success-box { transform: scale(1); }
        .success-icon { font-size: 4em; margin-bottom: 15px; }
        .btn-close-success { background: var(--dark); color: var(--white); border: none; padding: 14px 30px; border-radius: 50px; font-size: 1.1em; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <script src="products.js"></script>

    <div class="top-navbar">
        <button class="menu-icon-btn" onclick="toggleMenu()">☰</button>
        <span class="nav-logo-text" onclick="goHome()">Baiti</span>
        <button class="cart-icon-btn" onclick="toggleCart()">
            🛒 <span class="cart-badge" id="cart-count">0</span>
        </button>
    </div>

    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="menu-drawer" id="menu-drawer">
        <button class="close-menu" onclick="toggleMenu()">×</button>
        <h2 style="color: var(--dark); margin-top: 0; border-bottom: 2px solid #EAE3D9; padding-bottom: 15px;">القائمة</h2>
        <ul class="menu-list">
            <li onclick="goHome()"><span style="color: #C19A5B;">🏠</span> الرئيسية (العودة)</li>
            <li onclick="openCategory('all'); toggleMenu()"><span style="color: #4CAF50;">✨</span> جميع المنتجات</li>
            <li onclick="openWishlist(); toggleMenu()"><span style="color: #dc2743;">❤️</span> المفضلة</li>
            <li onclick="window.open('https://www.instagram.com/baiti.55/', '_blank')"><span style="color: #bc1888;">📸</span> الانستجرام</li>
        </ul>
    </div>

    <div id="home-view">
        <div class="hero-section">
            <img src="IMG_8489.jpeg" alt="Baiti Logo" class="main-logo">
            <p class="hero-subtitle">لمسة خاصة لبيتك 🤍 الدفع عند الاستلام</p>
            <a href="https://www.instagram.com/baiti.55/" target="_blank" class="ig-link">
                تابعونا على الانستجرام
            </a>
        </div>
        <div class="home-categories" id="home-categories">
            <div class="category-card all-products-card" onclick="openCategory('all')">
                <h2>✨ جميع المنتجات ✨</h2>
                <p>اضغط لعرض كل التشكيلة</p>
            </div>
        </div>
    </div>

    <div id="category-view" class="category-view">
        <button class="back-btn" onclick="goHome()"><span>➔</span> العودة</button>
        <h2 class="category-title-header" id="current-category-title">اسم القسم</h2>
        <div class="products" id="products-container"></div>
    </div>

    <div id="wishlist-view" class="category-view">
        <button class="back-btn" onclick="goHome()"><span>➔</span> العودة</button>
        <h2 class="category-title-header">المفضلة ❤️</h2>
        <div class="products" id="wishlist-container"></div>
    </div>

    <button class="floating-back-btn" id="floating-back" onclick="goHome()"><span>➔</span> عودة</button>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>السلة 🛒</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items-container" id="cart-items"></div>
        <div class="cart-total">
            <span>المجموع:</span>
            <span id="total-price">0 ₪</span>
        </div>
        <div class="checkout-form">
            <div class="form-group"><input type="text" id="customer-name" placeholder="الاسم الكامل"></div>
            <div class="form-group"><input type="tel" id="customer-phone" placeholder="رقم الهاتف"></div>
            <div class="form-group"><input type="text" id="customer-address" placeholder="العنوان"></div>
            <button class="btn-checkout" onclick="sendOrder()" id="submit-btn">إتمام الطلب</button>
        </div>
    </div>

    <div class="toast" id="toast">✔️ تمت إضافة المنتج</div>

    <div class="success-overlay" id="success-overlay">
        <div class="success-box">
            <div class="success-icon">✨</div>
            <h2>شكراً لك!</h2>
            <p>تم استلام طلبك بنجاح 🤍</p>
            <button class="btn-close-success" onclick="closeSuccess()">العودة للمتجر</button>
        </div>
    </div>

    <script>
        let cart = [];
        let wishlist = []; 
        let total = 0;

        // חסימת קיצורי מקלדת לפתיחת קוד מקור (F12, Ctrl+U וכו')
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }

        window.addEventListener('popstate', function(event) {
            document.getElementById('cart-drawer').classList.remove('active');
            document.getElementById('cart-overlay').classList.remove('active');
            document.getElementById('menu-drawer').classList.remove('active');
            document.getElementById('menu-overlay').classList.remove('active');
            if (event.state && event.state.view === 'category') openCategory(event.state.name, false, true);
            else if (event.state && event.state.view === 'wishlist') openWishlist(false, true);
            else goHome(true);
        });

        function initHome() {
            history.replaceState({ view: 'home' }, '', window.location.pathname);
            const container = document.getElementById('home-categories');
            const cards = container.querySelectorAll('.category-card:not(.all-products-card)');
            cards.forEach(card => card.remove());
            const categories = [...new Set(myProducts.map(p => p.category))];
            categories.forEach(category => {
                container.innerHTML += `<div class="category-card" onclick="openCategory('${category}')"><h2>${category}</h2><p>اضغط لعرض المنتجات</p></div>`;
            });
        }

        function toggleMenu() {
            document.getElementById('menu-drawer').classList.toggle('active');
            document.getElementById('menu-overlay').classList.toggle('active');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        function changeQty(index, delta) {
            const input = document.getElementById(`qty-${index}`);
            let val = parseInt(input.value) + delta;
            const max = myProducts[index].stock !== undefined ? myProducts[index].stock : 100;
            if (val < 1) val = 1;
            if (val > max) { alert(`عذراً! متوفر ${max} فقط.`); val = max; }
            input.value = val;
        }

        function renderProductCard(product, index) {
            const heart = wishlist.includes(index) ? '❤️' : '🤍';
            const stock = product.stock !== undefined ? product.stock : 100;
            if (stock === 0) {
                return `<div class="product-card"><div class="img-wrapper"><img src="${product.image}"></div><div class="product-info"><h3>${product.name}</h3><div class="stock-status stock-out">نفدت الكمية حالياً 💔</div><div class="price-row"><span class="price">₪${product.price}</span></div><button class="btn-add" disabled>نفدت الكمية</button></div></div>`;
            }
            const lowStock = stock <= 3 ? `<div class="stock-status stock-low">الكمية محدودة! بقي ${stock} فقط 🏃‍♀️</div>` : '';
            return `<div class="product-card"><button id="like-btn-${index}" class="like-btn" onclick="toggleLike(${index})">${heart}</button><div class="img-wrapper"><img src="${product.image}"></div><div class="product-info"><h3>${product.name}</h3><p class="desc">${product.description}</p>${lowStock}<div class="price-row"><span class="price">₪${product.price}</span><div class="qty-wrapper"><div class="qty-control"><button class="qty-btn" onclick="changeQty(${index},-1)">-</button><input id="qty-${index}" class="qty-input" value="1" readonly><button class="qty-btn" onclick="changeQty(${index},1)">+</button></div></div></div><button class="btn-add" onclick="addToCart(${index})">إضافة للسلة 🛒</button></div></div>`;
        }

        function openCategory(name, scroll = false, hist = false) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('wishlist-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
            document.getElementById('floating-back').style.display = 'flex';
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            document.getElementById('current-category-title').innerText = name === 'all' ? "جميع المنتجات ✨" : name;
            myProducts.forEach((p, i) => { if(name === 'all' || p.category === name) container.innerHTML += renderProductCard(p, i); });
            if (!hist) history.pushState({ view: 'category', name: name }, '', '#category');
            if (!scroll) window.scrollTo(0, 0);
        }

        function openWishlist(scroll = false, hist = false) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('wishlist-view').style.display = 'block';
            document.getElementById('floating-back').style.display = 'flex';
            const container = document.getElementById('wishlist-container');
            container.innerHTML = wishlist.length ? '' : '<p style="text-align:center;width:100%;margin-top:40px;">المفضلة فارغة حالياً 🤍</p>';
            wishlist.forEach(i => container.innerHTML += renderProductCard(myProducts[i], i));
            if (!hist) history.pushState({ view: 'wishlist' }, '', '#wishlist');
            if (!scroll) window.scrollTo(0, 0);
        }

        function toggleLike(i) {
            const idx = wishlist.indexOf(i);
            if (idx > -1) { wishlist.splice(idx, 1); document.getElementById(`like-btn-${i}`).innerText = '🤍'; }
            else { wishlist.push(i); document.getElementById(`like-btn-${i}`).innerText = '❤️'; }
            if (document.getElementById('wishlist-view').style.display === 'block') openWishlist(true, true);
        }

        function goHome(hist = false) {
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('wishlist-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('floating-back').style.display = 'none';
            if (!hist) history.pushState({ view: 'home' }, '', window.location.pathname);
            window.scrollTo(0, 0);
        }

        function addToCart(i) {
            const qty = parseInt(document.getElementById(`qty-${i}`).value);
            const p = myProducts[i];
            const stock = p.stock || 100;
            const exist = cart.find(item => item.name === p.name);
            if ((exist ? exist.quantity : 0) + qty > stock) return alert("عذراً! الكمية محدودة.");
            if (exist) exist.quantity += qty; else cart.push({name: p.name, price: p.price, quantity: qty});
            total += (p.price * qty);
            updateCartUI();
            const toast = document.getElementById('toast');
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function removeFromCart(i) {
            total -= (cart[i].price * cart[i].quantity);
            cart.splice(i, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const div = document.getElementById('cart-items');
            div.innerHTML = cart.length ? '' : '<p style="text-align:center;margin-top:30px;">السلة فارغة حالياً.</p>';
            cart.forEach((item, i) => {
                div.innerHTML += `<div class="cart-item"><div class="item-info"><span class="item-name">${item.name}</span><span class="item-qty-price">${item.quantity} × ₪${item.price}</span></div><div style="display:flex;align-items:center;gap:15px;"><span style="font-weight:700;">₪${item.price*item.quantity}</span><button class="remove-btn" onclick="removeFromCart(${i})">🗑️</button></div></div>`;
            });
            document.getElementById('total-price').innerText = total + ' ₪';
            document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.quantity, 0);
        }

        function closeSuccess() { document.getElementById('success-overlay').classList.remove('active'); goHome(); }

        // --- הגישה המאובטחת: שליחה לשרת הסודי שלנו (Backend) ---
        function sendOrder() {
            if (cart.length === 0) { alert('السلة فارغة!'); return; }

            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const address = document.getElementById('customer-address').value;
            
            if (!name || !phone || !address) { alert('الرجاء تعبئة الاسم، رقم الهاتف، والعنوان.'); return; }

            const btn = document.getElementById('submit-btn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            // המייל שלך לא נמצא כאן! המידע נשלח אל חדר הבקרה שלנו ב-Netlify.
            fetch("/.netlify/functions/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: name,
                    phone: phone,
                    address: address,
                    cart: cart
                })
            }).then(response => {
                if (!response.ok) throw new Error("Server rejected the order");
                return response.json();
            }).then(data => {
                toggleCart();
                document.getElementById('success-overlay').classList.add('active');
                fireConfetti();
                
                cart = []; total = 0; updateCartUI();
                document.getElementById('customer-name').value = ""; 
                document.getElementById('customer-phone').value = ""; 
                document.getElementById('customer-address').value = "";
                btn.innerText = "إتمام الطلب"; btn.disabled = false;
            }).catch(error => {
                alert("تم اكتشاف خطأ. يرجى المحاولة لاحقاً.");
                btn.innerText = "إتمام الطلب"; btn.disabled = false;
            });
        }

        window.onload = initHome;
    </script>
</body>
</html>
